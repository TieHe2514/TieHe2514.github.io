<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="google-site-verification" content="xBT4GhYoi5qRD5tr338pgPM5OWHHIDR6mNg1a3euekI" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="description" content="{{ site.description }}">
    <meta name="keywords" content="{{ site.keyword }}">
    <meta name="theme-color" content="{{ site.chrome-tab-theme-color }}">

    <!-- Open Graph -->
    <meta property="og:title"
        content="{% if page.title %}{{ page.title }} - {{ site.SEOTitle }}{% else %}{{ site.SEOTitle }}{% endif %}">
    {% case page.layout %}
    {% when 'post' %}
    <meta property="og:type" content="article">
    <meta property="og:description" content="{{ page.excerpt | strip_html | truncate:200 }}">
    {% if page.date %}
    <meta property="article:published_time" content="{{ page.date | date: " %Y-%m-%dT%H:%M:%SZ" }}">
    {% endif %}
    {% if page.author %}
    <meta property="article:author" content="{{ page.author }}">
    {% endif %}
    {% for tag in page.tags %}
    <meta property="article:tag" content="{{ tag }}">
    {% endfor %}
    {% else %}
    <meta property="og:type" content="website">
    <meta property="og:description"
        content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
    {% endcase %}
    <meta property="og:image" content="{{ site.url }}{{ site.sidebar-avatar }}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    <meta property="og:site_name" content="{{ site.SEOTitle }}">

    <title>{% if page.title %}{{ page.title }} - {{ site.SEOTitle }}{% else %}{{ site.SEOTitle }}{% endif %}</title>

    <!-- Web App Manifest -->
    <link rel="manifest" href="{{ site.baseurl }}/pwa/manifest.json">

    <!-- Favicon -->
    <link rel="shortcut icon" href="{{ site.baseurl }}/img/favicon.ico">

    <!-- Canonical URL -->
    <link rel="canonical" href="{{ page.url | replace:'index.html','' | prepend: site.baseurl | prepend: site.url }}">

    <!-- Bootstrap Core CSS -->
    <link rel="stylesheet" href="{{ " /css/bootstrap.min.css" | prepend: site.baseurl }}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ " /css/hux-blog.min.css" | prepend: site.baseurl }}">

    <!-- Custom Fonts -->
    <!-- <link href="http://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css" rel="stylesheet" type="text/css"> -->
    <!-- Hux change font-awesome CDN to qiniu -->
    <link href="//cdnjs.cloudflare.com/ajax/libs/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet"
        type="text/css">


    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
        <script src="https://oss.maxcdn.com/libs/html5shiv/3.7.0/html5shiv.js"></script>
        <script src="https://oss.maxcdn.com/libs/respond.js/1.4.2/respond.min.js"></script>
    <![endif]-->

    <!-- 自定义全局样式 -->
    <style>
    /* 全局背景铺满整个页面，滚动时固定 */
    html, body {
        background: url("{{ site.baseurl }}/img/fate1.jpg") no-repeat center top fixed;
        background-size: cover;
        background-color: transparent !important;
    }

    /* 移除顶部标题栏独立背景，和全局背景融合 */
    .intro-header {
        background: none !important;
    }

    /* ========== 顶部导航栏文字 ========== */
    .navbar-custom .navbar-brand,
    .navbar-custom .navbar-nav > li > a {
        color: #000 !important;
        font-weight: 400 !important;
        letter-spacing: 0.5px;
    }

    /* ========== 侧边栏与信息块 ========== */
    .well * {
        color: #000 !important;
    }
    .well .text-muted {
        color: #000 !important;
    }
    .sidebar-container {
        color: #263238 !important;
    }
    .sidebar-container h5,
    .sidebar-container h5 a {
        color: #111 !important;
        font-weight: 700;
    }
    .sidebar-container .short-about p {
        color: #263238 !important;
        line-height: 1.7;
    }
    .sidebar-container .short-about a {
        color: #0f6f8f !important;
    }
    .site-profile {
        margin: 18px 0 20px;
        padding-top: 16px;
        border-top: 1px solid rgba(15, 23, 42, 0.12);
    }
    .site-profile__description {
        margin: 0 0 12px !important;
        color: #1f2937 !important;
        font-size: 14px;
    }
    .site-profile__keywords {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
    }
    .site-profile__keywords span {
        display: inline-block;
        padding: 3px 8px;
        border: 1px solid rgba(15, 111, 143, 0.25);
        border-radius: 999px;
        background: rgba(15, 111, 143, 0.08);
        color: #0f4f66 !important;
        font-size: 12px;
        line-height: 1.4;
    }

    /* ========== 首页大标题+副标题 ========== */
    .intro-header .site-heading h1,
    .intro-header .page-heading h1 {
        color: #fff !important;
        font-weight: 700 !important;
        letter-spacing: 1px;
        text-shadow: 0 3px 18px rgba(0, 0, 0, 0.78), 0 1px 3px rgba(0, 0, 0, 0.9);
    }
    .intro-header .site-heading .subheading,
    .intro-header .page-heading .subheading {
        color: rgba(255, 255, 255, 0.94) !important;
        font-weight: 500 !important;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.75), 0 1px 2px rgba(0, 0, 0, 0.9);
    }
    .intro-header .post-heading h1,
    .intro-header .post-heading .subheading,
    .intro-header .post-heading .meta {
        color: #fff !important;
        font-weight: 500 !important;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.75), 0 1px 2px rgba(0, 0, 0, 0.9);
    }
    .hero-site-profile {
        max-width: 680px;
        margin: 20px auto 0;
    }
    .hero-site-profile p {
        margin: 0 0 12px;
        color: rgba(255, 255, 255, 0.94) !important;
        font-size: 16px;
        font-weight: 500;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.78), 0 1px 2px rgba(0, 0, 0, 0.9);
    }
    .hero-site-profile__keywords {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 8px;
    }
    .hero-site-profile__keywords span {
        display: inline-block;
        padding: 4px 10px;
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.32);
        color: #fff !important;
        font-size: 13px;
        line-height: 1.4;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
    }

    /* ========== 首页文章预览文字 ========== */
    .post-preview .post-title,
    .post-preview .post-subtitle,
    .post-preview .post-meta,
    .post-preview .post-meta a {
        color: #000 !important;
    }

    /* ========== 文章正文文字 ========== */
    .post-container p,
    .post-container h1,
    .post-container h2,
    .post-container h3,
    .post-container h4,
    .post-container h5,
    .post-container li,
    .post-container blockquote {
        color: #000 !important;
    }

    /* ========== 页脚文字 ========== */
    footer p,
    footer a,
    footer .text-muted {
        color: #000 !important;
    }

    /* ========== 链接hover效果 ========== */
    a:hover {
        color: #000 !important;
        opacity: 0.7;
    }

    /* ========== 内容区衬底 ========== */
    /* 通用内容区、侧边栏、页脚：高不透保证阅读 */
    main .container,
    .post-container,
    .well,
    footer {
        background-color: rgba(255, 255, 255, 0.95) !important;
        padding: 25px 30px;
        border-radius: 6px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    /* 首页posts文章卡片：加强透明 */
    .post-preview {
        background-color: rgba(255, 255, 255, 0.8) !important;
        padding: 25px 30px;
        border-radius: 6px;
        margin-bottom: 20px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    /* 顶部导航栏半透明白色 */
    .navbar-custom {
        background-color: rgba(255, 255, 255, 0.9) !important;
        border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    </style>
    
    <!-- ga & ba script hoook -->
    <script></script>

    <!-- Google AdSense -->
    <script data-ad-client="ca-pub-6487568398225121" async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js"></script>
</head>
