# Site settings
title: 半岛铁盒
SEOTitle: 半岛铁盒的博客 | TieHe Blog
header-img: img/fate1.jpg
email: 2502737968@qq.com
description: "这里是 @半岛铁盒 的个人博客，说了再见才发现再也见不到"
keyword: "半岛铁盒, TieHe，学生，数字全栈学习者，技术小白，hot heart"
# 替换成你的 GitHub Pages 域名
url: "https://TieHe2514.github.io/"
baseurl: ""

# Publish posts or collection documents with a future date.
future: true

# SNS settings
RSS: false
# 全部替换为你自己账号，无则留空
qq_username: "半岛铁盒"
github_username: TieHe2514

# Build settings
highlighter: rouge
permalink: pretty
paginate: 5
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true
# 中国时区开启，解决文章时间时差问题
timezone: CN

# Gems
plugins: [jekyll-paginate]

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# 评论系统（关闭原作者Disqus，后续你可自行换评论）
disqus_username: ""
netease_comment: false

# Analytics settings
# 百度/谷歌统计全部清空，不再使用原作者统计ID
# ba_track_id: 你的百度统计ID
ga_track_id: ""
ga_domain: ""

# Sidebar 侧边栏个人信息（完全改成你的介绍）
sidebar: true
sidebar-about-description: "数字全栈学习者，热爱足球与代码 <br> 持续记录学习随笔"
# 侧边头像：推荐上传头像到img文件夹，填写相对路径，也可直接用GitHub头像链接
sidebar-avatar: https://github.com/TieHe2514.png

# Featured Tags
featured-tags: true
featured-condition-size: 1

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering
page-mathjax: false
